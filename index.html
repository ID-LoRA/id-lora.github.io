<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f6f5f1;
      --text: #2c2c2c;
      --muted: #9a9a96;
      --border: #ddddd8;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .content {
      text-align: center;
      max-width: 440px;
      animation: fadeIn 1.2s ease both;
    }

    .logo {
      width: 36px;
      height: 36px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      margin: 0 auto 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.85rem;
    }

    h1 {
      font-weight: 400;
      font-size: 1.6rem;
      letter-spacing: -0.01em;
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    p {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 2.5rem;
    }

    a.link {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: color 0.3s, border-color 0.3s;
    }

    a.link:hover {
      color: var(--text);
      border-color: var(--text);
    }

    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
    }

    .footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      animation: fadeIn 1.2s ease 0.3s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="content">
    <div class="logo">●</div>
    <h1>We're getting things ready.</h1>
    <p>Nothing fancy yet — just setting up. Check back soon, or reach out if you'd like to get in touch.</p>
  </div>
</body>
</html>
